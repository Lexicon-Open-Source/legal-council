          required: true
          schema:
            $ref: '#/components/schemas/CouncilCaseType'
          example: corruption
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          example: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
      responses:
        '200':
          description: Cases by type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchCasesResponse'
              example:
                cases:
                  - id: 01HN6VJKM4XPQW3B5RTCDEFGHN
                    case_number: 45/Pid.Sus-TPK/2023/PN.Jkt.Pst
                    case_type: corruption
                    court_name: Pengadilan Tipikor Jakarta Pusat
                    defendant_name: Budi Santoso
                    summary_id: Kepala Dinas PUPR terbukti menerima suap dari kontraktor untuk memenangkan tender proyek jalan.
                total: 1
        '400':
          description: Invalid case type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
