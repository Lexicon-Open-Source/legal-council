/v1/council/deliberation/{session_id}/opinion:
  post:
    summary: Generate legal opinion
    operationId: generateCouncilOpinion
    tags:
    - council
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
      example: "sess_01HN6VJKM4XPQW3B5RTCDEFGHN"
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: ../schemas/common.yaml#/GenerateOpinionRequest
          example:
            include_dissent: true
    responses:
      '200':
        description: Opinion generated
        content:
          application/json:
            schema:
              $ref: ../schemas/council.yaml#/GenerateOpinionResponse
            example:
              opinion:
                session_id: "sess_01HN6VJKM4XPQW3B5RTCDEFGHN"
                generated_at: "2024-03-15T11:00:00Z"
                case_summary: "Kasus korupsi proyek pembangunan jalan dengan kerugian negara Rp 2,5 miliar"
                verdict_recommendation:
                  decision: "guilty"
                  confidence: "high"
                  reasoning: "Fakta hukum menunjukkan terdakwa terbukti menerima suap dan menyalahgunakan wewenang jabatan"
                sentence_recommendation:
                  imprisonment_months:
                    minimum: 48
                    maximum: 72
                    recommended: 60
                  fine_idr:
                    minimum: 200000000
                    maximum: 500000000
                    recommended: 300000000
                  additional_penalties:
                    - "Pencabutan hak politik selama 3 tahun"
                    - "Membayar uang pengganti Rp 2,5 miliar"
                legal_arguments:
                  for_conviction:
                    - argument: "Bukti transfer dana dari kontraktor ke rekening terdakwa"
                      source_agent: "strict"
                      supporting_cases: ["01HN6ABC123"]
                      strength: "strong"
                  for_leniency:
                    - argument: "Terdakwa adalah pelaku pertama kali dengan rekam jejak baik"
                      source_agent: "humanist"
                      supporting_cases: []
                      strength: "moderate"
                  for_severity:
                    - argument: "Kerugian negara sangat besar dan berdampak pada pembangunan infrastruktur"
                      source_agent: "strict"
                      supporting_cases: ["01HN6GHI789"]
                      strength: "strong"
                cited_precedents:
                  - case_id: "01HN6ABC123"
                    case_number: "45/Pid.Sus-TPK/2023/PN.Jkt.Pst"
                    relevance: "Kasus korupsi proyek infrastruktur serupa"
                    verdict_summary: "Terbukti bersalah, 6 tahun penjara"
                    how_it_applies: "Modus operandi mark-up harga identik"
                applicable_laws:
                  - law_reference: "Pasal 12 huruf a UU 31/1999 jo UU 20/2001"
                    description: "Penerimaan suap oleh penyelenggara negara"
                    how_it_applies: "Terdakwa menerima Rp 500 juta untuk memenangkan tender"
                  - law_reference: "Pasal 3 UU 31/1999"
                    description: "Penyalahgunaan wewenang jabatan"
                    how_it_applies: "Terdakwa menggunakan jabatan untuk mengatur pemenang tender"
                dissenting_views:
                  - "Hakim Humanis berpendapat vonis sebaiknya di bawah 5 tahun mengingat terdakwa adalah pelaku pertama kali"
  get:
    summary: Get generated opinion
    operationId: getCouncilOpinion
    tags:
    - council
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
      example: "sess_01HN6VJKM4XPQW3B5RTCDEFGHN"
    responses:
      '200':
        description: Opinion details
        content:
          application/json:
            schema:
              $ref: ../schemas/council.yaml#/GenerateOpinionResponse
            example:
              opinion:
                session_id: "sess_01HN6VJKM4XPQW3B5RTCDEFGHN"
                generated_at: "2024-03-15T11:00:00Z"
                case_summary: "Kasus korupsi proyek pembangunan jalan"
                verdict_recommendation:
                  decision: "guilty"
                  confidence: "high"
                  reasoning: "Terdakwa terbukti menerima suap dan menyalahgunakan wewenang"
                sentence_recommendation:
                  imprisonment_months:
                    minimum: 48
                    maximum: 72
                    recommended: 60
                  fine_idr:
                    minimum: 200000000
                    maximum: 500000000
                    recommended: 300000000
                  additional_penalties:
                    - "Pencabutan hak politik selama 3 tahun"
                legal_arguments:
                  for_conviction: []
                  for_leniency: []
                  for_severity: []
                cited_precedents: []
                applicable_laws: []
                dissenting_views: []
      '404':
        description: Opinion not found
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/Error
            example:
              error: "opinion not found for session"
              status_code: 404

/v1/council/deliberation/{session_id}/stream/initial:
  post:
    summary: Stream remaining initial opinions from judges
    description: |
      Session creation generates 1 random judge's opinion. This endpoint
      streams opinions from the remaining judges to complete the initial
      deliberation round.
    operationId: streamCouncilInitial
    tags:
    - council
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
      example: "sess_01HN6VJKM4XPQW3B5RTCDEFGHN"
    responses:
      '200':
        description: SSE stream of deliberation
        content:
          text/event-stream:
            schema:
              $ref: ../schemas/council.yaml#/StreamEventData
            example:
              event_type: "agent_start"
              agent_id: "humanist"

/v1/council/deliberation/{session_id}/stream/message:
  post:
    summary: Stream message response
    description: |
      Send a message and stream agent responses in real-time.
      The orchestrator determines which agent(s) should respond based on
      target_agent, message intent, and conversation balance.
    operationId: streamCouncilMessage
    tags:
    - council
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
      example: "sess_01HN6VJKM4XPQW3B5RTCDEFGHN"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/council.yaml#/StreamMessageRequest
          example:
            content: "Hakim Legalis, apa pendapat Anda tentang vonis yang tepat untuk kasus ini?"
            target_agent: "legalis"
    responses:
      '200':
        description: SSE stream of response
        content:
          text/event-stream:
            schema:
              $ref: ../schemas/council.yaml#/StreamEventData
            example:
              event_type: "user_message"
              message_id: "msg_004"
              content: "Hakim Strict, apa pendapat Anda..."

/v1/council/deliberation/{session_id}/stream/continue:
  post:
    summary: Stream continued deliberation
    description: |
      Continue the judicial discussion with streaming responses.
      Allows judges to deliberate amongst themselves in real-time.
    operationId: streamCouncilContinue
    tags:
    - council
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
      example: "sess_01HN6VJKM4XPQW3B5RTCDEFGHN"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/council.yaml#/StreamContinueRequest
          example:
            num_rounds: 1
    responses:
      '200':
        description: SSE stream of deliberation
        content:
          text/event-stream:
            schema:
              $ref: ../schemas/council.yaml#/StreamEventData
            example:
              event_type: "agent_start"
              agent_id: "humanist"

/v1/council/deliberation/{session_id}/download/pdf:
  get:
    summary: Download deliberation as PDF
    operationId: downloadCouncilPDF
    tags:
    - council
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
      example: "sess_01HN6VJKM4XPQW3B5RTCDEFGHN"
    responses:
      '200':
        description: PDF file
        headers:
          Content-Disposition:
            schema:
              type: string
            example: 'attachment; filename="deliberation_sess_01HN6VJKM4XPQW3B5RTCDEFGHN.pdf"'
        content:
          application/pdf:
            schema:
              type: string
              format: binary

/v1/council/cases/search:
  post:
    summary: Search similar cases
    operationId: searchCouncilCases
    tags:
    - council
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/common.yaml#/SearchCasesRequest
          example:
