  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Lexicon-Api-Key
      description: API key for bulk data egress (ProcureLens ETL)
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Authentik OIDC JWT token for admin authentication
    CookieAuth:
      type: apiKey
      in: cookie
      name: admin_session
      description: |
        Opaque admin BFF session cookie issued by `/v1/admin/auth/callback`.
        HttpOnly, Secure, SameSite=Lax. Admin endpoints accept EITHER this
        cookie OR `Authorization: Bearer <jwt>`; supplying both causes the
        Bearer token to win.
    TurnstileToken:
      type: apiKey
      in: header
      name: X-Turnstile-Token
      description: Cloudflare Turnstile verification token from client-side widget
