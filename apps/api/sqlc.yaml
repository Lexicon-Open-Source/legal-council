version: "2"
plugins:
  - name: py
    wasm:
      url: https://downloads.sqlc.dev/plugin/sqlc-gen-python_1.3.0.wasm
      sha256: fbedae96b5ecae2380a70fb5b925fd4bff58a6cfb1f3140375d098fbab7b3a3c
sql:
  - engine: "postgresql"
    queries: "internal/db/queries/"
    schema: "db/schemas/"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          # Procurement tender JSONB columns with proper structs
          - column: "crawler.spse_tenders.pemenang"
            go_type:
              import: "github.com/lexiconindonesia/lexicon-backend/internal/db/types"
              type: "PemenangList"
          - column: "crawler.spse_tenders.pemenang_berkontrak"
            go_type:
              import: "github.com/lexiconindonesia/lexicon-backend/internal/db/types"
              type: "PemenangList"
          - column: "crawler.spse_tenders.peserta"
            go_type:
              import: "github.com/lexiconindonesia/lexicon-backend/internal/db/types"
              type: "PesertaList"
          - column: "crawler.spse_tenders.hasil_evaluasi"
            go_type:
              import: "github.com/lexiconindonesia/lexicon-backend/internal/db/types"
              type: "HasilEvaluasiList"
          - column: "crawler.spse_tenders.lokasi_pekerjaan"
            go_type:
              import: "github.com/lexiconindonesia/lexicon-backend/internal/db/types"
              type: "LokasiPekerjaanList"
          - column: "crawler.spse_tenders.jadwal"
            go_type:
              import: "github.com/lexiconindonesia/lexicon-backend/internal/db/types"
              type: "JadwalList"
          - column: "crawler.spse_tenders.syarat_kualifikasi"
            go_type:
              import: "github.com/lexiconindonesia/lexicon-backend/internal/db/types"
              type: "SyaratKualifikasi"
              pointer: true
          - column: "crawler.spse_tenders.realisasi"
            go_type:
              import: "github.com/lexiconindonesia/lexicon-backend/internal/db/types"
              type: "Realisasi"
              pointer: true
          # Default: other JSONB columns use RawMessage
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "json"
            go_type: "encoding/json.RawMessage"

  # Python code generation for LLM service (council queries)
  - engine: "postgresql"
    queries: "internal/db/queries/council.sql"
    schema: "db/schemas/council_v1.sql"
    codegen:
      - plugin: py
        out: "llm/src/council/db/sqlc/council"
        options:
          package: "council_queries"
          emit_async_querier: true
          emit_sync_querier: false
          emit_pydantic_models: true

  # Python code generation for LLM service (llm_extractions queries)
  - engine: "postgresql"
    queries: "internal/db/queries/llm_extractions.sql"
    schema: "db/schemas/llm_extraction.sql"
    codegen:
      - plugin: py
        out: "llm/src/council/db/sqlc/extraction"
        options:
          package: "extraction_queries"
          emit_async_querier: true
          emit_sync_querier: false
          emit_pydantic_models: true
