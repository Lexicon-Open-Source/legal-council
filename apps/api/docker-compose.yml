networks:
  default:
    name: ${DOCKER_NETWORK:-lexicon-network}
    external: ${DOCKER_NETWORK_EXTERNAL:-false}

services:
  api:
    image: ${API_IMAGE:-ghcr.io/lexiconindonesia/lexicon-backend:latest}
    container_name: ${API_CONTAINER_NAME:-lexicon-backend}
    ports:
      - "${API_HOST_PORT:-8000}:${PORT:-8000}"
    environment:
      # Application
      - APP_NAME=${APP_NAME:-lexicon-backend}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=${PORT:-8000}
      - HTTP_WRITE_TIMEOUT=${HTTP_WRITE_TIMEOUT:-90s}
      - BASE_URL=${BASE_URL:-http://localhost:8000}

      # Database (required)
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_MAX_CONNS=${DATABASE_MAX_CONNS:-25}

      # Redis (required)
      - REDIS_URL=${REDIS_URL}

      # LLM Service (required)
      - LLM_SERVICE_URL=${LLM_SERVICE_URL:-http://localhost:18001}
      - LLM_SERVICE_TIMEOUT=${LLM_SERVICE_TIMEOUT:-60s}
      - LLM_API_KEY=${LLM_API_KEY}

      # Chatbot Service (required)
      - CHATBOT_SERVICE_URL=${CHATBOT_SERVICE_URL}
      - CHATBOT_API_KEY=${CHATBOT_API_KEY}

      # S3-compatible Storage (optional - for pre-signed PDF URLs)
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-garage}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-}
      - S3_PRESIGN_EXPIRY=${S3_PRESIGN_EXPIRY:-15m}

      # ProcureLens API (optional)
      - PROCURELENS_API_KEY=${PROCURELENS_API_KEY:-}

      # OCDS Compiled JSON Export (ephemeral local artifacts)
      - OCDS_COMPILED_ARTIFACT_DIR=${OCDS_COMPILED_ARTIFACT_DIR:-/tmp/lexicon-ocds-compiled}
      - OCDS_COMPILED_ARTIFACT_TTL=${OCDS_COMPILED_ARTIFACT_TTL:-6h}
      - OCDS_COMPILED_WORKER_CONCURRENCY=${OCDS_COMPILED_WORKER_CONCURRENCY:-1}
      - OCDS_COMPILED_DEFAULT_CHUNK_SIZE=${OCDS_COMPILED_DEFAULT_CHUNK_SIZE:-5000}
      - OCDS_COMPILED_MAX_CHUNK_SIZE=${OCDS_COMPILED_MAX_CHUNK_SIZE:-10000}
      - OCDS_COMPILED_CLEANUP_INTERVAL=${OCDS_COMPILED_CLEANUP_INTERVAL:-10m}

      # Crawler Service (optional - enables /v1/admin/crawlers/* proxy)
      - CRAWLER_BASE_URL=${CRAWLER_BASE_URL:-}
      - CRAWLER_API_KEY=${CRAWLER_API_KEY:-}

      # Cloudflare Turnstile (optional - server-side verification)
      - TURNSTILE_ENABLED=${TURNSTILE_ENABLED:-false}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - TURNSTILE_SESSION_SECRET=${TURNSTILE_SESSION_SECRET:-}
      - TURNSTILE_APP_API_KEY=${TURNSTILE_APP_API_KEY:-}

      # Bot Detection (optional)
      - BOT_DETECTION_ENABLED=${BOT_DETECTION_ENABLED:-true}
      - BOT_DETECTION_BLOCK_BOTS=${BOT_DETECTION_BLOCK_BOTS:-true}
      - BOT_DETECTION_RATIO_THRESHOLD=${BOT_DETECTION_RATIO_THRESHOLD:-50}
      - BOT_DETECTION_RATE_THRESHOLD=${BOT_DETECTION_RATE_THRESHOLD:-60}
      - BOT_DETECTION_WHITELIST_GOOD_BOTS=${BOT_DETECTION_WHITELIST_GOOD_BOTS:-true}
      - BOT_DETECTION_WINDOW_DURATION=${BOT_DETECTION_WINDOW_DURATION:-5m}

      # Screening (optional - AML sanctions search)
      - SCREENING_SCORE_THRESHOLD=${SCREENING_SCORE_THRESHOLD:-0.70}
      - SCREENING_SCORE_THRESHOLD_BROAD=${SCREENING_SCORE_THRESHOLD_BROAD:-0.85}
      - SCREENING_CACHE_SEARCH_TTL=${SCREENING_CACHE_SEARCH_TTL:-1h}
      - SCREENING_CACHE_SOURCES_TTL=${SCREENING_CACHE_SOURCES_TTL:-24h}

      # OpenTelemetry (optional - for self-hosted SigNoz)
      # For SigNoz: set OTEL_ENABLED=true and OTLP_ENDPOINT=signoz-otel-collector:4317
      # Ensure this container can reach the SigNoz collector (same Docker network)
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-localhost:4317}
      - OTEL_SAMPLE_RATE=${OTEL_SAMPLE_RATE:-1.0}
      - SERVICE_VERSION=${SERVICE_VERSION:-0.1.0}

      # Admin OIDC Authentication (Authentik) â€” see ADR-0017 + ADR-0019
      # AUTHN_ADMIN_ISSUER alone enables resource-server mode (Bearer-only).
      # Setting AUTHN_ADMIN_CLIENT_SECRET activates the BFF flow and makes the
      # next 5 vars mandatory; missing any will cause Load() to error at boot.
      # ADMIN_COOKIE_DOMAIN is additionally required when AUTHN_ADMIN_REDIRECT_URL
      # and ADMIN_DASHBOARD_URL hosts differ (e.g. api.lexicon.id + admin.lexicon.id);
      # without it the BFF cookies are host-only and the dashboard hits an infinite
      # redirect loop. Boot fails fast if missing in cross-host topology.
      - AUTHN_ADMIN_ISSUER=${AUTHN_ADMIN_ISSUER:-}
      - AUTHN_ADMIN_CLIENT_ID=${AUTHN_ADMIN_CLIENT_ID:-}
      - AUTHN_ADMIN_CLIENT_SECRET=${AUTHN_ADMIN_CLIENT_SECRET:-}
      - AUTHN_ADMIN_CLAIM_PATH=${AUTHN_ADMIN_CLAIM_PATH:-groups}
      - AUTHN_ADMIN_REDIRECT_URL=${AUTHN_ADMIN_REDIRECT_URL:-}
      - ADMIN_DASHBOARD_URL=${ADMIN_DASHBOARD_URL:-}
      - ADMIN_COOKIE_DOMAIN=${ADMIN_COOKIE_DOMAIN:-}
      - ADMIN_SESSION_ENCRYPTION_KEY=${ADMIN_SESSION_ENCRYPTION_KEY:-}
      - ADMIN_SESSION_TTL=${ADMIN_SESSION_TTL:-24h}
      - ADMIN_SESSION_REFRESH_LEEWAY=${ADMIN_SESSION_REFRESH_LEEWAY:-120s}
      - ADMIN_SESSION_ABSOLUTE_TTL=${ADMIN_SESSION_ABSOLUTE_TTL:-12h}

      # CMS File Upload (optional)
      - CMS_FRONTEND_BASE_URL=${CMS_FRONTEND_BASE_URL:-https://lexicon.id}
      - CMS_MAX_UPLOAD_SIZE=${CMS_MAX_UPLOAD_SIZE:-52428800}
      - CMS_MAX_IMAGE_SIZE=${CMS_MAX_IMAGE_SIZE:-10485760}
      - CMS_MAX_DOCUMENT_SIZE=${CMS_MAX_DOCUMENT_SIZE:-52428800}
      - CMS_ALLOWED_IMAGE_TYPES=${CMS_ALLOWED_IMAGE_TYPES:-image/jpeg,image/png,image/webp,image/gif}
      - CMS_ALLOWED_DOCUMENT_TYPES=${CMS_ALLOWED_DOCUMENT_TYPES:-application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/csv,text/plain,application/zip}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    depends_on:
      llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  llm:
    image: ${LLM_IMAGE:-ghcr.io/lexiconindonesia/lexicon-llm:latest}
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: ${LLM_CONTAINER_NAME:-lexicon-llm}
    ports:
      - "8001:8001"
    environment:
      # Application
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Database (required - same as main service)
      - DATABASE_URL=${DATABASE_URL}

      # Gemini API for AI processing (required)
      - GEMINI_API_KEY=${GEMINI_API_KEY}

      # LLM API Key for authentication (required)
      - LLM_API_KEY=${LLM_API_KEY}

      # LLM Model Configuration
      - LLM_MODEL=${LLM_MODEL:-gemini/gemini-2.5-flash}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini/gemini-embedding-001}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-768}
      - EMBEDDING_TASK_TYPE=${EMBEDDING_TASK_TYPE:-RETRIEVAL_DOCUMENT}

      # OpenTelemetry (optional - for self-hosted SigNoz with Python auto-instrumentation)
      # For SigNoz: set OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_SERVICE_NAME=${LLM_OTEL_SERVICE_NAME:-lexicon-llm}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}
      - OTEL_EXPORTER_OTLP_INSECURE=${OTEL_EXPORTER_OTLP_INSECURE:-true}
      - OTEL_TRACES_EXPORTER=${OTEL_TRACES_EXPORTER:-otlp}
      - OTEL_METRICS_EXPORTER=${OTEL_METRICS_EXPORTER:-otlp}
      - OTEL_LOGS_EXPORTER=${OTEL_LOGS_EXPORTER:-otlp}
      # Resource attributes for SigNoz (uses deprecated deployment.environment for compatibility)
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=${ENVIRONMENT:-production},service.version=${SERVICE_VERSION:-0.1.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
