repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        exclude: ^api/redoc-static\.html$
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: gofmt -w
        language: system
        types: [go]
        exclude: ^internal/i18n/keys_gen\.go$

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test ./... -count=1
        language: system
        types: [go]
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        files: go\.(mod|sum)$
        pass_filenames: false

      - id: sqlc-generate
        name: sqlc generate
        entry: make sqlc-generate
        language: system
        files: \.sql$
        pass_filenames: false

  # Python (LLM service) - linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]
        files: ^llm/
      - id: ruff-format
        name: ruff format
        files: ^llm/

  # Python (LLM service) - strict check and tests
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd llm && uv run ruff check .'
        language: system
        files: ^llm/.*\.py$
        pass_filenames: false

      - id: llm-test
        name: llm pytest
        entry: bash -c 'cd llm && uv run pytest -q'
        language: system
        files: ^llm/.*\.py$
        pass_filenames: false
