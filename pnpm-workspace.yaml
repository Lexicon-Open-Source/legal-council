packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  core-js: true
  esbuild: true
  msw: false
  protobufjs: true
  sharp: true
  unrs-resolver: true

